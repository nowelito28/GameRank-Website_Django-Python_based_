name: Deploy to Local Minikube
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
jobs:
  deploy:
    # Corre en cualquier servidor propio/local indiferentemente del SO:
    runs-on: self-hosted 
    # Usamos bash para todos los pasos (macOS, Linux y Windows con Git Bash instalado)
    # Requisito en Windows: tener Git for Windows -> https://git-scm.com/download/win
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: false  # Evita que Git busque submódulos fantasmas
          clean: false       # Evita que Git borre tus logs o archivos del runner (como tunnel.log)
      - name: Install Git for Windows (if needed)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          if (-not (Get-Command bash -ErrorAction SilentlyContinue)) {
            Write-Host "Git Bash not found, installing Git for Windows..."
            if (Get-Command winget -ErrorAction SilentlyContinue) {
              winget install --id Git.Git -e --silent
            } elseif (Get-Command choco -ErrorAction SilentlyContinue) {
              choco install git -y
            } else {
              Write-Error "winget nor choco found. Install Git for Windows manually in the runner."
              exit 1
            }
            # Añadir Git al PATH persistente entre steps usando el mecanismo oficial de GitHub Actions:
            # ($env:PATH solo vive en este proceso, $GITHUB_PATH persiste para todos los steps siguientes)
            $gitBin = "C:\Program Files\Git\bin"
            $gitCmd = "C:\Program Files\Git\cmd"
            Add-Content -Path $env:GITHUB_PATH -Value $gitBin
            Add-Content -Path $env:GITHUB_PATH -Value $gitCmd
            Write-Host "Git for Windows installed and added to GITHUB_PATH."
          } else {
            Write-Host "Git Bash already install, continuing..."
          }
      - name: Start Docker and Minikube
        run: |
          # En macOS abre la interfaz gráfica de Docker Desktop si está cerrada:
          if [ "$RUNNER_OS" == "macOS" ]; then
            open -a Docker
          fi
          
          # Esperando a que Docker esté listo...
          while ! docker system info > /dev/null 2>&1; do sleep 2; done
          
          # Docker listo, arrancando Minikube si no está encendido...
          minikube status || minikube start
      - name: GameRank Namespace
        run: |
          # Crea el namespace 'gamerank-ns' de forma segura primero haciendo un .yaml en memoria del namespace: apply -> si no existe lo crea, si ya existe no hace nada
          kubectl create namespace gamerank-ns --dry-run=client -o yaml | kubectl apply -f -

          # Cambia el contexto actual al namespace 'gamerank-ns'
          kubectl config set-context --current --namespace=gamerank-ns
      - name: Build Docker Image
        run: |
          # Construye la imagen de docker de la app -> Dockerfile (path a este fichero al final)
          docker build -t nowelito28/gamerank:latest .
      - name: Load Image into Minikube
        run: |
          # Carga la imagen de docker en minikube:
          minikube image load nowelito28/gamerank:latest

          # Lista las imagenes de docker en minikube:
          minikube image ls
      - name: Enable Minikube Ingress Addon
        run: |
          # Habilita el addon ingress de minikube para que el servicio sea accesible desde fuera del cluster(url) mediante el ingress:
          minikube addons enable ingress || true
      - name: Deploy to Minikube
        run: |
          # Aplica el deployment de la imagen de docker:
          kubectl apply -f ./k8s/deployment.yaml

          # Aplica el servicio de la imagen de docker:
          kubectl apply -f ./k8s/service.yaml

          # Aplica el ingress de la imagen de docker:
          kubectl apply -f ./k8s/ingress.yaml
      - name: Start Minikube Tunnel (macOS / Linux)
        if: runner.os == 'macOS' || runner.os == 'Linux'
        run: |
          # Matando túneles antiguos por si acaso...
          echo "${{ secrets.PASS }}" | sudo -S pkill -f "minikube tunnel" || true

          # El tunnel corre en segundo plano y redirige la salida al fichero tunnel.log
          echo "${{ secrets.PASS }}" | sudo -S nohup minikube tunnel > tunnel.log 2>&1 &
      - name: Start Minikube Tunnel (Windows)
        if: runner.os == 'Windows'
        # Usamos PowerShell aquí porque gsudo es nativo de Windows, no de bash
        shell: pwsh
        env:
          # gsudo lee esta variable de entorno para elevar privilegios sin prompt interactivo
          GSUDO_CREDENTIALS_PASSWORD: ${{ secrets.W_PASS }}
        run: |
          # Instala gsudo si no está disponible:
          if (-not (Get-Command gsudo -ErrorAction SilentlyContinue)) {
            # winget funciona en Windows 10 21H2+. Si no existe, usamos Chocolatey como fallback:
            if (Get-Command winget -ErrorAction SilentlyContinue) {
              winget install --id gerardog.gsudo -e --silent
            } elseif (Get-Command choco -ErrorAction SilentlyContinue) {
              choco install gsudo -y
            } else {
              Write-Error "No se encontró winget ni choco para instalar gsudo. Instálalo manualmente en el runner."
              exit 1
            }
          }

          # Matando túneles antiguos por si acaso...
          gsudo --no-auth-if-already-elevated taskkill /F /IM minikube.exe 2>$null || $true

          # El tunnel corre en segundo plano con Start-Job.
          # Pasamos la contraseña explícitamente al ScriptBlock porque los env vars del step padre no se heredan en runspaces separados:
          $pass = $env:GSUDO_CREDENTIALS_PASSWORD
          Start-Job -ScriptBlock {
            $env:GSUDO_CREDENTIALS_PASSWORD = $using:pass
            gsudo minikube tunnel *> tunnel.log
          }
      - name: Validation
        run: |
          # Esperando que la aplicación esté lista de forma dinámica...
          kubectl rollout status deployment/gamerank-deployment --timeout=90s

          # Obtener la IP del host
          kubectl get nodes -o wide

          # Obtener los pods de la imagen de docker
          kubectl get pods -n gamerank-ns

          # Obtener el deployment de la imagen de docker
          kubectl get deployment -n gamerank-ns

          # Obtener el servicio de la imagen de docker
          kubectl get svc -n gamerank-ns

          # Obtener el ingress de la imagen de docker
          kubectl get ingress -n gamerank-ns
      - name: Show App URL
        run: |
          # Url de la app:
          echo "URL to the deployed app (main page): http://$(kubectl get ingress gamerank-ingress -n gamerank-ns -o jsonpath='{.spec.rules[0].host}')"